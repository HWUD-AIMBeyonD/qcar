# ==============================================================================
# BEHAVIOR TREE
# ==============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base
    odom_topic: /odometry_filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    bt_xml_filename: /home/nvidia/qcar_ws/src/qcar_nav2_bringup/config/bt_navigation.xml

navfn_planner:
  ros__parameters:
    use_sim_time: false
    tolerance: 0.5
    use_astar: false
    allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: /local_costmap/costmap_raw
    footprint_topic: /local_costmap/published_footprint
    cycle_frequency: 5.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: nav2_recoveries/Spin
    backup:
      plugin: nav2_recoveries/BackUp
    wait:
      plugin: nav2_recoveries/Wait
    global_frame: odom
    robot_base_frame: base
    transform_timeout: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.30
    min_rotational_vel: 0.10
    rotational_acc_lim: 1.0

# ==============================================================================
#  OPTION A: CUSTOM RPP CONTROLLER
# ==============================================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    FollowPath:
      desired_linear_vel: 0.5
      lookahead_dist: 0.6            
      min_lookahead_dist: 0.30        
      max_lookahead_dist: 0.90        
      lookahead_time: 1.5            
      max_angular_vel: 1.0            
      use_velocity_scaled_lookahead_dist: false
      transform_tolerance: 0.2

    # Local Costmap (Duplicated for RPP)
    local_costmap:
      global_frame: odom
      robot_base_frame: base
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      transform_tolerance: 0.30
      always_send_full_costmap: true
      robot_radius: 0.24
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.2
        cost_scaling_factor: 3.0

# ==============================================================================
#  OPTION B: STANLEY CONTROLLER
# ==============================================================================
stanley_controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    FollowPath:
      desired_linear_vel: 0.5
      max_angular_vel: 0.5    
      k_gain: 0.8             
      wheelbase: 0.256        

    # Local Costmap (Duplicated for Stanley)
    local_costmap:
      global_frame: odom
      robot_base_frame: base
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      transform_tolerance: 0.30
      always_send_full_costmap: true
      robot_radius: 0.24
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.55
        cost_scaling_factor: 5.0

# ==============================================================================
# GLOBAL COSTMAP
# ==============================================================================
global_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      transform_tolerance: 0.30
      robot_radius: 0.24
      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::StaticLayer", "nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.25
        cost_scaling_factor: 3.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - /global_costmap/costmap
      - /world_model
      - /navfn_planner
      - /recoveries_server
      - /bt_navigator

