bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

    # FIX: point to your BT XML
    bt_xml_filename: /home/nvidia/qcar_ws/src/qcar_nav2_bringup/config/bt_navigation.xml
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    transform_tolerance: 0.3
    
    # Use simple standard trajectory generator (no accel limits issues)
    trajectory_generator_name: dwb_plugins::StandardTrajectoryGenerator
    
    # Simulation parameters
    sim_time: 1.5
    vx_samples: 20
    vy_samples: 1
    vtheta_samples: 20
    discretize_by_time: false
    
    # Velocity limits
    max_vel_x: 0.25
    min_vel_x: 0.0
    max_vel_y: 0.0
    min_vel_y: 0.0
    max_vel_theta: 0.8
    min_speed_xy: 0.05
    max_speed_xy: 0.25
    min_speed_theta: 0.1
    
    # Acceleration limits
    acc_lim_x: 0.5
    acc_lim_y: 0.0
    acc_lim_theta: 1.0
    decel_lim_x: -0.5
    decel_lim_y: 0.0
    decel_lim_theta: -1.0
    
    # Goal tolerances
    xy_goal_tolerance: 0.10
    yaw_goal_tolerance: 0.20
    
    # Path pruning
    prune_plan: true
    prune_distance: 1.0
    
    # Publishing
    publish_evaluation: false
    publish_global_plan: true
    publish_local_plan: true
    publish_trajectories: true
    publish_transformed_plan: true
    publish_cost_grid_pc: false
    debug_trajectory_details: false
    
    # Goal checker
    goal_checker_name: dwb_plugins::SimpleGoalChecker
    
    # Legacy DWA bias params (keep for compatibility)
    path_distance_bias: 32.0
    goal_distance_bias: 24.0
    occdist_scale: 0.02
    
    # Obstacle footprint scaling
    max_scaling_factor: 0.2
    scaling_speed: 0.25
    
    # Critics list
    critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
    
    # Critic scales
    ObstacleFootprint.scale: 0.02
    ObstacleFootprint.sum_scores: false
    ObstacleFootprint.max_scaling_factor: 0.2
    ObstacleFootprint.scaling_speed: 0.25
    
    PathAlign.scale: 32.0
    PathAlign.aggregation_type: last
    
    GoalAlign.scale: 24.0
    GoalAlign.aggregation_type: last
    
    PathDist.scale: 32.0
    PathDist.aggregation_type: sum
    
    GoalDist.scale: 24.0
    GoalDist.aggregation_type: sum
    
    RotateToGoal.scale: 32.0
    
    Oscillation.scale: 1.0
    Oscillation.x_only_threshold: 0.05

navfn_planner:
  ros__parameters:
    use_sim_time: false
    tolerance: 0.5
    use_astar: false
    allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false

    # FIX: make these absolute (more robust)
    costmap_topic: /local_costmap/costmap_raw
    footprint_topic: /local_costmap/published_footprint

    cycle_frequency: 5.0

    recovery_plugins:
      - spin
      - backup
      - wait

    spin:
      plugin: nav2_recoveries/Spin
    backup:
      plugin: nav2_recoveries/BackUp
    wait:
      plugin: nav2_recoveries/Wait

    global_frame: odom
    robot_base_frame: base
    transform_timeout: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.30
    min_rotational_vel: 0.10
    rotational_acc_lim: 1.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true

    # FIX: use fully-qualified node names (leading /)
    node_names:
      - /global_costmap/costmap
      - /local_costmap/costmap
      - /world_model
      - /navfn_planner
      - /controller_server
      - /recoveries_server
      - /bt_navigator

# ---- Global costmap ----
global_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      transform_tolerance: 0.30

      footprint: "[[0.15,0.07],[0.15,-0.07],[-0.15,-0.07],[-0.15,0.07]]"

      # Dashing-style explicit plugin selection
      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::StaticLayer", "nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

# ---- Local costmap ----
local_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 4
      height: 4
      transform_tolerance: 0.30
      always_send_full_costmap: true

      footprint: "[[0.15,0.07],[0.15,-0.07],[-0.15,-0.07],[-0.15,0.07]]"

      # Dashing-style explicit plugin selection (NO StaticLayer here)
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

