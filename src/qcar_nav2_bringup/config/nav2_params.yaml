bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3

    controller_plugins:
      - FollowPath

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      global_frame_id: odom
      robot_base_frame_id: base

      sim_time: 1.2
      vx_samples: 10
      vtheta_samples: 20
      linear_granularity: 0.02
      angular_granularity: 0.02

      max_vel_x: 0.10
      min_vel_x: 0.00
      max_vel_y: 0.0
      min_vel_y: 0.0
      max_vel_theta: 0.30
      min_vel_theta: -0.30

      acc_lim_x: 0.50
      acc_lim_y: 0.0
      acc_lim_theta: 1.00

      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      RotateToGoal:
        scale: 2.0
        slowing_factor: 5.0
        lookahead_time: 1.0

      Oscillation:
        scale: 1.0

      BaseObstacle:
        scale: 0.02

      GoalAlign:
        scale: 1.0
        forward_point_distance: 0.10

      PathAlign:
        scale: 1.0
        forward_point_distance: 0.10

      PathDist:
        scale: 32.0

      GoalDist:
        scale: 24.0

navfn_planner:
  ros__parameters:
    use_sim_time: false
    tolerance: 0.5
    use_astar: false
    allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0

    recovery_plugins:
      - spin
      - backup
      - wait

    spin:
      plugin: nav2_recoveries/Spin
    backup:
      plugin: nav2_recoveries/BackUp
    wait:
      plugin: nav2_recoveries/Wait

    global_frame: odom
    robot_base_frame: base
    transform_timeout: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.30
    min_rotational_vel: 0.10
    rotational_acc_lim: 1.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - global_costmap/costmap
      - local_costmap/costmap
      - world_model
      - navfn_planner
      - controller_server
      - recoveries_server
      - bt_navigator

# ---- Global costmap ----
global_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      transform_tolerance: 0.30

      footprint: "[[0.15,0.07],[0.15,-0.07],[-0.15,-0.07],[-0.15,0.07]]"

      # Dashing-style explicit plugin selection
      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::StaticLayer", "nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

# ---- Local costmap ----
local_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 4
      height: 4
      transform_tolerance: 0.30
      always_send_full_costmap: true

      footprint: "[[0.15,0.07],[0.15,-0.07],[-0.15,-0.07],[-0.15,0.07]]"

      # Dashing-style explicit plugin selection (NO StaticLayer here)
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

