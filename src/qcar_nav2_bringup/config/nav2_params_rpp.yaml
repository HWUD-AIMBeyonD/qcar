# ==============================================================================
# NAV2 PARAMS: RPP CONTROLLER VERSION
# ==============================================================================
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    base_frame_id: "base"
    global_frame_id: "map"
    map_topic: "/map"
    qos_map:
      reliability: "reliable"
      durability: "transient_local"
      depth: 1
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    max_particles: 1000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    tf_broadcast: true
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    bt_xml_filename: /home/nvidia/qcar_ws/src/qcar_nav2_bringup/config/bt_navigation.xml

navfn_planner:
  ros__parameters:
    use_sim_time: false
    tolerance: 0.5
    use_astar: false
    allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: /local_costmap/costmap_raw
    footprint_topic: /local_costmap/published_footprint
    cycle_frequency: 5.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: nav2_recoveries/Spin
    backup:
      plugin: nav2_recoveries/BackUp
    wait:
      plugin: nav2_recoveries/Wait
    global_frame: odom
    robot_base_frame: base
    transform_timeout: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.30
    min_rotational_vel: 0.10
    rotational_acc_lim: 1.0

# ==============================================================================
# RPP CONTROLLER & LOCAL COSTMAP
# ==============================================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    FollowPath:
      desired_linear_vel: 0.5
      lookahead_dist: 0.6            
      min_lookahead_dist: 0.30        
      max_lookahead_dist: 0.90        
      lookahead_time: 1.5            
      max_angular_vel: 1.0            
      use_velocity_scaled_lookahead_dist: false
      transform_tolerance: 0.2

    local_costmap:
      global_frame: odom
      robot_base_frame: base
      update_frequency: 10.0
      publish_frequency: 5.0
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      transform_tolerance: 0.30
      always_send_full_costmap: true
      robot_radius: 0.24
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.55
        cost_scaling_factor: 5.0

# ==============================================================================
# GLOBAL COSTMAP & WORLD MODEL
# ==============================================================================
global_costmap:
  costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      transform_tolerance: 0.30
      robot_radius: 0.24
      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::StaticLayer", "nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.55
        cost_scaling_factor: 5.0

world_model:
  ros__parameters:
    use_sim_time: false
    costmap_topic: /global_costmap/costmap_raw
    footprint_topic: /global_costmap/published_footprint

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - /amcl
      - /global_costmap/costmap
      - /world_model
      - /navfn_planner
      - /recoveries_server
      - /bt_navigator
